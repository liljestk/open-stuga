name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.13
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: apps/api/python/requirements*.txt

      - name: Install dependencies
        run: npm ci

      - name: Install TP-Link bridge test dependencies
        run: python -m pip install -r apps/api/python/requirements.txt -r apps/api/python/requirements-dev.txt

      - name: Check release version consistency
        run: npm run version:check

      - name: Require a pull-request version bump
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          VERSION_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: npm run version:check-pr

      - name: Typecheck
        run: npm run typecheck

      - name: Lint TP-Link bridge
        run: python -m ruff check apps/api/python apps/api/python_tests && python -m ruff format --check apps/api/python apps/api/python_tests

      - name: Test with coverage
        run: npm run test:coverage

      - name: Test TP-Link bridge with coverage
        run: npm run test:coverage:python

      - name: Build
        run: npm run build

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build production containers
        run: |
          docker build --target api --tag stuga-api-ci:${{ github.sha }} .
          docker build --target backup --tag stuga-backup-ci:${{ github.sha }} .
          docker build --target web --tag stuga-web-ci:${{ github.sha }} .

      - name: Smoke-test built API on minimum Node.js
        run: npm run smoke:built-api

      - name: Read project version for SonarQube
        id: project-version
        shell: bash
        run: node -e "process.stdout.write('version=' + require('./package.json').version + '\n')" >> "$GITHUB_OUTPUT"

      - name: Detect optional SonarQube credentials
        id: sonar
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [[ -n "$SONAR_TOKEN" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::SONAR_TOKEN is not configured; skipping optional SonarQube analysis."
          fi

      - name: SonarQube Cloud analysis and quality gate
        if: >-
          steps.sonar.outputs.enabled == 'true' &&
          (
            github.event_name == 'push' ||
            (
              github.event_name == 'pull_request' &&
              github.event.pull_request.head.repo.full_name == github.repository &&
              github.actor != 'dependabot[bot]'
            )
          )
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.projectVersion=${{ steps.project-version.outputs.version }}
