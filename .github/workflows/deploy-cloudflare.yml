name: Deploy Cloudflare hosted edition

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "apps/web/**"
      - "packages/contracts/**"
      - "cloudflare/**"
      - ".github/workflows/deploy-cloudflare.yml"
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "apps/web/**"
      - "packages/contracts/**"
      - "cloudflare/**"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Apply D1 migrations and deploy production"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.13
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cloudflare/package-lock.json

      # cloudflare/ is intentionally outside the root workspaces and has its
      # own lockfile. This preserves the existing Docker/root npm ci graph.
      - name: Install application dependencies
        run: npm ci

      - name: Install hosted Worker dependencies
        run: npm ci --prefix cloudflare

      - name: Validate existing application
        run: |
          npm run typecheck
          npm test
          npm run build

      - name: Validate hosted Worker
        run: |
          npm run typecheck --prefix cloudflare
          npm test --prefix cloudflare
          npm run deploy:dry-run --prefix cloudflare

  deploy:
    needs: validate
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.CLOUDFLARE_DEPLOY_ENABLED == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: cloudflare-production
    concurrency:
      group: cloudflare-production
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.13
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cloudflare/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm ci --prefix cloudflare
          npm run build

      - name: Verify production resource and Access configuration
        shell: bash
        run: |
          if grep -q '00000000-0000-0000-0000-000000000000' cloudflare/wrangler.jsonc; then
            echo "::error::Replace the placeholder D1 database_id before production deploy."
            exit 1
          fi
          if grep -q 'CHANGE-ME' cloudflare/wrangler.jsonc; then
            echo "::error::Configure the Cloudflare Access TEAM_DOMAIN and POLICY_AUD before production deploy."
            exit 1
          fi

      - name: Apply migrations and deploy Worker
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare
          command: |
            d1 migrations apply open-stuga --remote
            deploy
