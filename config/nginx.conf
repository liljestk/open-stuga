pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /dev/stdout;
  error_log /dev/stderr warn;

  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  sendfile on;
  server_tokens off;
  client_max_body_size 16m;

  gzip on;
  gzip_types application/javascript application/json application/xml image/svg+xml text/css text/plain;

  # Port 8081 is reachable only from the Compose frontend network and is
  # reserved for cloudflared. This avoids trusting browser-supplied forwarding
  # headers on the loopback-published local listener.
  map $server_port $stuga_forwarded_proto {
    8081 https;
    default $scheme;
  }
  map $server_port $stuga_client_address {
    8081 $http_cf_connecting_ip;
    default $remote_addr;
  }

  server {
    listen 8080;
    listen [::]:8080;
    listen 8081;
    listen [::]:8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    # OSM's standard tile service requires an identifying Referer from web pages;
    # send only the origin cross-site and never a house coordinate or route path.
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options DENY always;
    # Geolocation is allowed only for this origin and is requested solely after
    # the user chooses "Use this device's location" in Setup.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors 'none'; connect-src 'self'; img-src 'self' data: blob: https://tile.openstreetmap.org; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; worker-src 'self' blob:" always;

    # Machine-only endpoints are reachable solely on Compose's backend network.
    location ^~ /api/v1/internal/ {
      return 404;
    }

    # The narrowly bypassed Cloudflare Access handoff stores an invitation
    # fragment in tab-scoped storage before the protected root redirects for
    # authentication. Only these two immutable static files are public.
    location = /invite-bootstrap {
      try_files /invite-bootstrap.html =404;
    }

    location = /invite-bootstrap.js {
      try_files /invite-bootstrap.js =404;
    }

    location /api/ {
      proxy_pass http://api:8787;
      proxy_http_version 1.1;
      # Preserve the browser-visible port so the API can compare Origin exactly.
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $stuga_client_address;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $stuga_forwarded_proto;
      # Overwrite any client-supplied marker with the per-deployment credential
      # loaded from the dedicated read-only runtime volume.
      proxy_set_header X-Stuga-Local-Proxy "${LOCAL_AUTH_PROXY_SECRET}";
      proxy_set_header Connection "";

      # Required for timely server-sent events.
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1h;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
