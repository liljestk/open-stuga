sonar.organization=liljestk
sonar.projectKey=liljestk_open-stuga
sonar.projectName=open-stuga
sonar.sourceEncoding=UTF-8

# Analyze the complete repository, including infrastructure and workflow files.
sonar.sources=.
sonar.tests=apps/api/tests,apps/api/python_tests,apps/web/src
sonar.exclusions=apps/api/tests/**,apps/api/python_tests/**,apps/web/src/**/*.test.ts,apps/web/src/**/*.test.tsx,apps/web/src/**/*.spec.ts,apps/web/src/**/*.spec.tsx,apps/web/src/test/**,**/node_modules/**,**/dist/**,**/coverage/**,**/__pycache__/**,**/.venv/**,data/**
sonar.test.inclusions=apps/api/tests/**,apps/api/python_tests/**,apps/web/src/**/*.test.ts,apps/web/src/**/*.test.tsx,apps/web/src/**/*.spec.ts,apps/web/src/**/*.spec.tsx,apps/web/src/test/**
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info,apps/web/coverage/lcov.info
sonar.python.coverage.reportPaths=apps/api/coverage-python.xml

# Make the scanner wait for the server-side quality gate and fail on rejection.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
